<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoL Explorer — Items</title>
    <meta name="description" content="Browse Summoner's Rift items with stats, gold, and build paths." />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-theme="dark">

    <header class="nav">
      <a class="nav__brand" href="index.html">⚔️ LoL Explorer</a>
      <button class="nav__hamburger" data-nav-toggle aria-label="Toggle navigation menu">☰</button>
      <nav class="nav__menu" data-nav-menu aria-label="Primary">
        <a href="index.html" class="nav__link">Champions</a>
        <a href="items.html" class="nav__link nav__link--active">Items</a>
        <a href="builds.html" class="nav__link">My Builds</a>
        <button class="nav__theme" data-theme-toggle aria-label="Switch theme" title="Toggle dark / light theme">🌓</button>
      </nav>
    </header>

    <main class="page">
      <section class="hero">
        <h1>Items</h1>
        <p class="hero__sub">Purchasable Summoner's Rift items — patch <span id="patchLabel">…</span></p>
      </section>

      <section class="controls" aria-label="Item filters">
        <input
          type="search"
          id="itemSearch"
          class="controls__search"
          placeholder="Search items…"
          aria-label="Search items by name"
        />
        <select id="tagFilter" class="controls__select" aria-label="Filter items by tag">
          <option value="All">All tags</option>

        </select>
      </section>

      <p class="result-count" id="itemCount" aria-live="polite"></p>

      <p class="state state--loading" id="loadingState">Loading items…</p>
      <p class="state state--error" id="errorState" hidden></p>

      <section class="item-grid" id="itemGrid" aria-label="Item list"></section>
    </main>

    <div class="modal" id="itemModal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__backdrop" data-modal-close></div>
      <div class="modal__panel" id="modalPanel">
        <button class="modal__close" data-modal-close aria-label="Close dialog">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <footer class="footer">
      <p>BTU Final Project · Data © Riot Games via Data Dragon · Not endorsed by Riot Games.</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/items.js"></script>
  </body>
</html>
